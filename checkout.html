<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Handcraft Haven</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .checkout-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 100px 20px 50px;
        }

        .checkout-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .checkout-header h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .checkout-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: start;
        }

        .checkout-form {
            background-color: var(--dark-surface);
            padding: 2rem;
            border-radius: 15px;
            border: 1px solid var(--border-color);
        }

        body.light-mode .checkout-form {
            background-color: var(--light-bg);
            border: 1px solid var(--light-border-color);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--dark-bg);
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        body.light-mode .form-group input,
        body.light-mode .form-group textarea {
            background-color: var(--light-surface);
            border: 1px solid var(--light-border-color);
            color: var(--light-text-primary);
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .order-summary {
            background-color: var(--dark-surface);
            padding: 2rem;
            border-radius: 15px;
            border: 1px solid var(--border-color);
            position: sticky;
            top: 100px;
        }

        body.light-mode .order-summary {
            background-color: var(--light-bg);
            border: 1px solid var(--light-border-color);
        }

        .order-summary h2 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--primary-color);
        }

        .order-items {
            margin-bottom: 1.5rem;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        body.light-mode .order-item {
            border-bottom: 1px solid var(--light-border-color);
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .order-item-name {
            font-weight: 500;
        }

        .order-item-price {
            color: var(--accent-color);
            font-weight: bold;
        }

        .order-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-top: 2px solid var(--border-color);
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 1rem;
        }

        body.light-mode .order-total {
            border-top: 2px solid var(--light-border-color);
        }

        .total-price {
            color: var(--accent-color);
        }

        .confirm-btn {
            width: 100%;
            background: linear-gradient(135deg, #25d366, #128c7e);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 1.5rem;
        }

        .confirm-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3);
        }

        .back-to-cart {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            margin-bottom: 2rem;
            transition: color 0.3s ease;
        }

        .back-to-cart:hover {
            color: var(--primary-color);
        }

        .empty-checkout {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .empty-checkout i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 1.1rem;
            transition: color 0.3s ease;
        }

        .form-group input:focus + i,
        .form-group textarea:focus + i {
            color: var(--primary-color);
        }

        .error-message {
            color: var(--error-color);
            font-size: 0.9rem;
            margin-top: 0.5rem;
            display: none;
        }

        .form-group.error input {
            border-color: var(--error-color);
        }

        .form-group.error .error-message {
            display: block;
        }

        @media (max-width: 768px) {
            .checkout-content {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .checkout-container {
                padding: 80px 15px 30px;
            }

            .order-summary {
                position: static;
            }

            .checkout-header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-palette"></i>
                <span>Handcraft Haven</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="index.html#products" class="nav-link">Products</a></li>
                <li><a href="index.html#about" class="nav-link">About</a></li>
                <li><a href="login.html" class="nav-link">Login</a></li>
            </ul>
            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </button>
                <div class="cart-icon" id="cartIcon">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" id="cartCount">0</span>
                </div>
                <div class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Checkout Section -->
    <section class="checkout-section">
        <div class="checkout-container">
            <a href="index.html" class="back-to-cart">
                <i class="fas fa-arrow-left"></i>
                Back to Shopping
            </a>

            <div class="checkout-header">
                <h1>Checkout</h1>
                <p>Complete your order details below</p>
            </div>

            <div id="checkoutContent">
                <!-- Content will be dynamically loaded -->
            </div>
        </div>
    </section>

    <script>
        // Shopping Cart Class Definition
        class ShoppingCart {
            constructor() {
                this.items = JSON.parse(localStorage.getItem('cart')) || [];
                this.cartCount = document.getElementById('cartCount');
                this.cartItems = document.getElementById('cartItems');
                this.totalPrice = document.getElementById('totalPrice');
                this.cartSidebar = document.getElementById('cartSidebar');
                this.overlay = document.getElementById('overlay');
                
                this.updateCartUI();
            }

            addItem(name, price) {
                const existingItem = this.items.find(item => item.name === name);
                
                if (existingItem) {
                    existingItem.quantity += 1;
                } else {
                    this.items.push({
                        id: Date.now(),
                        name: name,
                        price: price,
                        quantity: 1
                    });
                }
                
                this.saveCart();
                this.updateCartUI();
                this.showNotification(`${name} added to cart!`);
            }

            removeItem(id) {
                this.items = this.items.filter(item => item.id !== id);
                this.saveCart();
                this.updateCartUI();
            }

            updateQuantity(id, quantity) {
                const item = this.items.find(item => item.id === id);
                if (item) {
                    item.quantity = parseInt(quantity);
                    if (item.quantity <= 0) {
                        this.removeItem(id);
                    } else {
                        this.saveCart();
                        this.updateCartUI();
                    }
                }
            }

            getTotal() {
                return this.items.reduce((total, item) => total + (item.price * item.quantity), 0);
            }

            saveCart() {
                localStorage.setItem('cart', JSON.stringify(this.items));
            }

            updateCartUI() {
                // Update cart count
                const totalItems = this.items.reduce((total, item) => total + item.quantity, 0);
                this.cartCount.textContent = totalItems;

                // Update cart items
                if (this.items.length === 0) {
                    this.cartItems.innerHTML = `
                        <div class="empty-cart">
                            <i class="fas fa-shopping-cart"></i>
                            <p>Your cart is empty</p>
                        </div>
                    `;
                } else {
                    this.cartItems.innerHTML = this.items.map(item => `
                        <div class="cart-item">
                            <div class="cart-item-info">
                                <div class="cart-item-name">${item.name}</div>
                                <div class="cart-item-price">NPR ${item.price}</div>
                                <div class="quantity-controls">
                                    <button class="quantity-btn" onclick="cart.updateQuantity(${item.id}, ${item.quantity - 1})">
                                        <i class="fas fa-minus"></i>
                                    </button>
                                    <span class="quantity-value">${item.quantity}</span>
                                    <button class="quantity-btn" onclick="cart.updateQuantity(${item.id}, ${item.quantity + 1})">
                                        <i class="fas fa-plus"></i>
                                    </button>
                                </div>
                            </div>
                            <button class="remove-item" onclick="cart.removeItem(${item.id})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    `).join('');
                }

                // Update total price
                this.totalPrice.textContent = `NPR ${this.getTotal()}`;
            }

            openCart() {
                this.cartSidebar.classList.add('open');
                this.overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            closeCart() {
                this.cartSidebar.classList.remove('open');
                this.overlay.classList.remove('active');
                document.body.style.overflow = '';
            }

            showNotification(message) {
                const notification = document.createElement('div');
                notification.className = 'notification';
                notification.textContent = message;
                
                notification.style.cssText = `
                    position: fixed;
                    top: 100px;
                    right: 20px;
                    background: linear-gradient(135deg, #22c55e, #16a34a);
                    color: white;
                    padding: 15px 25px;
                    border-radius: 10px;
                    box-shadow: 0 10px 25px rgba(34, 197, 94, 0.3);
                    z-index: 10000;
                    font-weight: 600;
                    animation: slideIn 0.3s ease-out;
                    max-width: 300px;
                `;
                
                document.body.appendChild(notification);
                
                setTimeout(() => {
                    notification.style.animation = 'slideOut 0.3s ease-out';
                    setTimeout(() => {
                        notification.remove();
                    }, 300);
                }, 3000);
            }
        }

        // Checkout Page Specific JavaScript
        class CheckoutPage {
            constructor() {
                this.cart = new ShoppingCart();
                this.checkoutContent = document.getElementById('checkoutContent');
                this.init();
            }

            init() {
                this.loadCheckoutContent();
                this.setupThemeToggle();
            }

            loadCheckoutContent() {
                const cartItems = JSON.parse(localStorage.getItem('cart')) || [];
                
                if (cartItems.length === 0) {
                    this.checkoutContent.innerHTML = `
                        <div class="empty-checkout">
                            <i class="fas fa-shopping-cart"></i>
                            <h2>Your cart is empty</h2>
                            <p>Add some products to your cart before checkout</p>
                            <a href="index.html#products" class="btn-primary">Browse Products</a>
                        </div>
                    `;
                    return;
                }

                this.checkoutContent.innerHTML = `
                    <div class="checkout-content">
                        <div class="checkout-form">
                            <h2>Delivery Information</h2>
                            <form id="checkoutForm">
                                <div class="form-group">
                                    <label for="name">Full Name *</label>
                                    <div class="input-group">
                                        <i class="fas fa-user"></i>
                                        <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                                    </div>
                                    <span class="error-message">Please enter your full name</span>
                                </div>

                                <div class="form-group">
                                    <label for="email">Email Address *</label>
                                    <div class="input-group">
                                        <i class="fas fa-envelope"></i>
                                        <input type="email" id="email" name="email" placeholder="your.email@example.com" required>
                                    </div>
                                    <span class="error-message">Please enter a valid email address</span>
                                </div>

                                <div class="form-group">
                                    <label for="phone">Phone Number *</label>
                                    <div class="input-group">
                                        <i class="fas fa-phone"></i>
                                        <input type="tel" id="phone" name="phone" placeholder="+977-98XXXXXXXXX" required>
                                    </div>
                                    <span class="error-message">Please enter a valid phone number</span>
                                </div>

                                <div class="form-group">
                                    <label for="street">Street Address *</label>
                                    <div class="input-group">
                                        <i class="fas fa-home"></i>
                                        <input type="text" id="street" name="street" placeholder="Enter your street address" required>
                                    </div>
                                    <span class="error-message">Please enter your street address</span>
                                </div>

                                <div class="form-group">
                                    <label for="address">Delivery Address (Complete)</label>
                                    <div class="input-group">
                                        <i class="fas fa-map-marker-alt"></i>
                                        <textarea id="address" name="address" placeholder="Include street, city, and area code" required></textarea>
                                    </div>
                                    <span class="error-message">Please enter your complete delivery address</span>
                                </div>
                            </form>
                        </div>

                        <div class="order-summary">
                            <h2>Order Summary</h2>
                            <div class="order-items">
                                ${cartItems.map(item => `
                                    <div class="order-item">
                                        <span class="order-item-name">${item.name} x${item.quantity}</span>
                                        <span class="order-item-price">NPR ${item.price * item.quantity}</span>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="order-total">
                                <span>Total:</span>
                                <span class="total-price">NPR ${this.cart.getTotal()}</span>
                            </div>
                            <button class="confirm-btn" onclick="checkoutPage.confirmOrder()">
                                <i class="fab fa-whatsapp"></i>
                                Confirm Order via WhatsApp
                            </button>
                        </div>
                    </div>
                `;

                this.setupFormValidation();
            }

            setupFormValidation() {
                const form = document.getElementById('checkoutForm');
                const inputs = form.querySelectorAll('input, textarea');

                inputs.forEach(input => {
                    input.addEventListener('blur', () => this.validateField(input));
                    input.addEventListener('input', () => {
                        if (input.parentElement.classList.contains('error')) {
                            this.validateField(input);
                        }
                    });
                });
            }

            validateField(field) {
                const formGroup = field.closest('.form-group');
                const value = field.value.trim();

                formGroup.classList.remove('error');

                if (!value) {
                    formGroup.classList.add('error');
                    return false;
                }

                if (field.type === 'email') {
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if (!emailRegex.test(value)) {
                        formGroup.classList.add('error');
                        return false;
                    }
                }

                if (field.type === 'tel') {
                    const phoneRegex = /^(\+977[-\s]?)?98\d{8}$/;
                    if (!phoneRegex.test(value.replace(/[\s-]/g, ''))) {
                        formGroup.classList.add('error');
                        return false;
                    }
                }

                return true;
            }

            validateForm() {
                const form = document.getElementById('checkoutForm');
                const inputs = form.querySelectorAll('input[required], textarea[required]');
                let isValid = true;

                inputs.forEach(input => {
                    if (!this.validateField(input)) {
                        isValid = false;
                    }
                });

                return isValid;
            }

            confirmOrder() {
                if (!this.validateForm()) {
                    this.showError('Please fill in all required fields correctly');
                    return;
                }

                const formData = {
                    name: document.getElementById('name').value.trim(),
                    email: document.getElementById('email').value.trim(),
                    phone: document.getElementById('phone').value.trim(),
                    street: document.getElementById('street').value.trim(),
                    address: document.getElementById('address').value.trim()
                };

                const cartItems = JSON.parse(localStorage.getItem('cart')) || [];

                // Send order via WhatsApp
                this.sendWhatsAppOrder(formData, cartItems);
            }

            sendWhatsAppOrder(customerDetails, orderItems) {
                const phoneNumber = '+9779847244773';
                
                const itemsList = orderItems.map(item => 
                    `🛍️ ${item.name} x${item.quantity} - NPR ${item.price * item.quantity}`
                ).join('\n');
                
                const totalAmount = orderItems.reduce((total, item) => total + (item.price * item.quantity), 0);
                
                const message = `🛒 *NEW ORDER - Handcraft Haven*

👤 *Customer Details:*
Name: ${customerDetails.name}
Email: ${customerDetails.email}
Phone: ${customerDetails.phone}
Street: ${customerDetails.street}
Address: ${customerDetails.address}

📦 *Order Details:*
${itemsList}

💰 *Total Amount:* NPR ${totalAmount}

📍 *Delivery Address:* ${customerDetails.address}

📞 *Contact:* ${customerDetails.phone}
📧 *Email:* ${customerDetails.email}

Thank you for your order! 🎉`;
                
                const encodedMessage = encodeURIComponent(message);
                const whatsappUrl = `https://wa.me/${phoneNumber.replace('+', '')}?text=${encodedMessage}`;
                
                // Clear cart after successful order
                localStorage.removeItem('cart');
                
                // Open WhatsApp
                window.open(whatsappUrl, '_blank');
                
                // Redirect to home after a delay
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            }

            showError(message) {
                const notification = document.createElement('div');
                notification.className = 'notification';
                notification.textContent = message;
                
                notification.style.cssText = `
                    position: fixed;
                    top: 100px;
                    right: 20px;
                    background: linear-gradient(135deg, #ef4444, #dc2626);
                    color: white;
                    padding: 15px 25px;
                    border-radius: 10px;
                    box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3);
                    z-index: 10000;
                    font-weight: 600;
                    animation: slideIn 0.3s ease-out;
                    max-width: 300px;
                `;
                
                document.body.appendChild(notification);
                
                setTimeout(() => {
                    notification.style.animation = 'slideOut 0.3s ease-out';
                    setTimeout(() => {
                        notification.remove();
                    }, 300);
                }, 3000);
            }

            setupThemeToggle() {
                const themeToggle = document.getElementById('themeToggle');
                const themeIcon = document.getElementById('themeIcon');
                const body = document.body;

                // Load saved theme
                const savedTheme = localStorage.getItem('theme');
                if (savedTheme === 'light') {
                    body.classList.add('light-mode');
                    themeIcon.className = 'fas fa-sun';
                }

                themeToggle.addEventListener('click', () => {
                    const isLightMode = body.classList.toggle('light-mode');
                    
                    if (isLightMode) {
                        themeIcon.className = 'fas fa-sun';
                        localStorage.setItem('theme', 'light');
                    } else {
                        themeIcon.className = 'fas fa-moon';
                        localStorage.setItem('theme', 'dark');
                    }
                });
            }
        }

        // Initialize checkout page
        const checkoutPage = new CheckoutPage();

        // Mobile Navigation
        const hamburger = document.querySelector('.hamburger');
        const navMenu = document.querySelector('.nav-menu');
        const navLinks = document.querySelectorAll('.nav-link');

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            navMenu.classList.toggle('active');
        });

        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                hamburger.classList.remove('active');
                navMenu.classList.remove('active');
            });
        });

        // Cart functionality
        document.getElementById('cartIcon').addEventListener('click', () => {
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
